# Compile all presentation subfolders that contain .ci-compile
# Add an empty .ci-compile file in a presentation subfolder to include it in CI.

name: Compile presentations

on:
  push:
    branches: [main]
    paths:
      - 'theme/**'
      - 'presentations/**'
      - '.github/workflows/compile-presentations.yml'
  pull_request:
    branches: [main]
    paths:
      - 'theme/**'
      - 'presentations/**'
      - '.github/workflows/compile-presentations.yml'
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile presentations
        run: |
          set -e
          mkdir -p build-output
          compiled_any=false
          for dir in presentations/*/; do
            if [ -f "${dir}.ci-compile" ]; then
              name=$(basename "$dir")
              echo "Compiling: $name"
              cd "$dir"
              pdflatex -interaction=nonstopmode -halt-on-error main.tex
              pdflatex -interaction=nonstopmode -halt-on-error main.tex
              cd ../..
              cp "${dir}main.pdf" "build-output/${name}.pdf"
              compiled_any=true
            fi
          done
          if [ "$compiled_any" = "false" ]; then
            echo "No presentations to compile"
          fi

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: presentation-pdfs
          path: build-output/*.pdf
          if-no-files-found: ignore
