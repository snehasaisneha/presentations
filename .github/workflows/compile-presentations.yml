# Compile all presentation subfolders that contain .ci-compile
# Add an empty .ci-compile file in a presentation subfolder to include it in CI.

name: Compile presentations

on:
  push:
    branches: [main]
    paths:
      - 'theme/**'
      - 'presentations/**'
      - '.github/workflows/compile-presentations.yml'
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compile presentations
        run: |
          set -e
          for dir in presentations/*/; do
            if [ -f "${dir}.ci-compile" ]; then
              name=$(basename "$dir")
              echo "Compiling: $name"
              cd "$dir"
              pdflatex -interaction=nonstopmode -halt-on-error main.tex
              pdflatex -interaction=nonstopmode -halt-on-error main.tex
              cd ../..
            fi
          done

      - name: Commit PDFs
        run: |
          git add presentations/*/main.pdf
          if git diff --staged --quiet; then
            echo "No PDF changes to commit"
          else
            git commit -m "Build PDFs [skip ci]"
            git push
          fi
