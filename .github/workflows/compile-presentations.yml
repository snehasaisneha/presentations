# Compile all presentations in presentations/ that contain a .ci-compile marker file.
# Add an empty .ci-compile file in a presentation subfolder to include it in CI.

name: Compile presentations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile presentations with .ci-compile
        id: compile
        run: |
          set -e
          compiled_any=false
          for dir in presentations/*/; do
            [ -f "${dir}.ci-compile" ] || continue
            compiled_any=true
            name=$(basename "$dir")
            echo "::group::Compile $name"
            (cd "$dir" && pdflatex -interaction=nonstopmode -halt-on-error main.tex)
            (cd "$dir" && pdflatex -interaction=nonstopmode -halt-on-error main.tex)
            echo "::endgroup::"
          done
          echo "compiled_any=$compiled_any" >> "$GITHUB_OUTPUT"

      - name: Upload PDFs
        if: steps.compile.outputs.compiled_any == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: presentation-pdfs
          path: presentations/*/main.pdf
