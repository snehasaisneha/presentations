# Compile only presentation subfolders that contain .ci-compile and had changes.
# Add an empty .ci-compile file in a presentation subfolder to include it in CI.
# If theme/ changes, all .ci-compile presentations are recompiled.

name: Compile presentations

on:
  push:
    branches: [main]
    paths:
      - 'theme/**'
      - 'presentations/**'
      - '.github/workflows/compile-presentations.yml'
  pull_request:
    branches: [main]
    paths:
      - 'theme/**'
      - 'presentations/**'
      - '.github/workflows/compile-presentations.yml'

jobs:
  compile:
    runs-on: ubuntu-latest
    container:
      image: texlive/texlive:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find presentations to compile
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git ls-files)
          else
            CHANGED_FILES=$(git diff --name-only "$BASE" "${{ github.sha }}" --)
          fi
          THEME_CHANGED=false
          echo "$CHANGED_FILES" | grep -q '^theme/' && THEME_CHANGED=true
          TO_COMPILE=""
          for dir in presentations/*/; do
            [ -f "${dir}.ci-compile" ] || continue
            name=$(basename "$dir")
            if [ "$THEME_CHANGED" = "true" ]; then
              TO_COMPILE="$TO_COMPILE $name"
            elif echo "$CHANGED_FILES" | grep -q "^presentations/$name/"; then
              TO_COMPILE="$TO_COMPILE $name"
            fi
          done
          TO_COMPILE=$(echo "$TO_COMPILE" | xargs)
          echo "to_compile=$TO_COMPILE" >> "$GITHUB_OUTPUT"
          echo "Will compile: ${TO_COMPILE:-none}"

      - name: Compile changed presentations
        id: compile
        run: |
          set -e
          compiled_any=false
          mkdir -p build-output
          for name in ${{ steps.changed.outputs.to_compile }}; do
            [ -n "$name" ] || continue
            dir="presentations/$name"
            echo "::group::Compile $name"
            (cd "$dir" && pdflatex -interaction=nonstopmode -halt-on-error main.tex)
            (cd "$dir" && pdflatex -interaction=nonstopmode -halt-on-error main.tex)
            cp "presentations/$name/main.pdf" "build-output/$name.pdf"
            echo "::endgroup::"
            compiled_any=true
          done
          echo "compiled_any=$compiled_any" >> "$GITHUB_OUTPUT"

      - name: Upload PDFs
        if: steps.compile.outputs.compiled_any == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: presentation-pdfs
          path: build-output/*.pdf
